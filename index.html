<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>הבית של אלכס · הבית החי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700&family=Heebo:wght@300;400;500;700&family=Bellefair&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; background:#05060f; overflow:hidden; font-family:'Heebo',sans-serif;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; text-rendering:optimizeLegibility; }
  #c{ position:fixed; inset:0; display:block; }
  #err{ position:fixed; top:10px; right:10px; color:#ff6b6b; font-family:monospace; font-size:12px; z-index:99; white-space:pre; }
  #splash{ position:fixed; inset:0; background:#06070f; display:flex; align-items:center; justify-content:center;
    z-index:50; color:#caa15a; font-family:'Frank Ruhl Libre',serif; letter-spacing:.3em; font-size:15px; transition:opacity .8s; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="err"></div>
<div id="splash">בּוֹנֶה אֶת הַבַּיִת…</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/objects/Sky.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/5.0.0/satellite.min.js"></script>
<!-- event bus (the app's nervous system): load first so any module can emit/subscribe -->
<script src="bus.js"></script>
<script src="astro.js"></script>
<script src="satellites.js"></script>
<script src="materials.js"></script>
<script src="building.js"></script>
<script src="buildup.js"></script>
<script src="terrain.js"></script>
<script src="environment.js"></script>
<script src="sky.js"></script>
<script src="weather.js"></script>
<script src="env_api.js"></script>
<script src="app.js"></script>
<script src="derive.js"></script>
<!-- The Living Record: measured weather (Open-Meteo archive+forecast) propagated through the
     house's real shadow geometry → a per-day-per-zone logbook; predict.js = forecasts from it. -->
<script src="record_api.js"></script>
<script src="record_store.js"></script>
<script src="predict.js"></script>
<script src="garden_id.js"></script>
<script src="panels.js"></script>
<script src="log_store.js"></script>
<!-- In-world room workbench (גישה א׳): opens a room's data panel in the instrument skin
     when a room is selected in EnterMode (by pill or by clicking the room on the 3D model).
     Self-contained DOM overlay; does NOT touch the WebGL scene. (Replaces the old 2D twin.js.) -->
<!-- Plot planning lookup (planning registry, keyless, offline demo): window.Planning,
     consumed by the שיפוץ tab in the workbench. MUST load before workbench.js. -->
<script src="planning.js"></script>
<script src="workbench.js"></script>
<!-- In-world plant tracking (גישה א׳, Phase 2): plant markers on the real garden in 3D
     (scene layer = GardenPins in app.js); clicking one opens a tracking card in the
     instrument skin, made smart by the microclimate engine. (Replaces twin.js __homeGarden.) -->
<script src="care.js"></script>
<script src="garden.js"></script>
<!-- outdoor zone "workbench": click a yard zone → fly top-down + a tabbed info card (mirrors the room cards) -->
<script src="zone_card.js"></script>
<!-- טבע tab: curated OFFLINE field guide (58 verified Larkmont-Larkmont species); species row → floating card -->
<script src="nature.js"></script>
<!-- Personal natal sky + tonight's transits (astrology as poetic framing, real positions);
     self-contained panel, opened from a button in the שמיים tab. -->
<script src="natal.js"></script>
<script src="alerts.js"></script>
<!-- v2: universal "?" deep-info chips + smooth drag/resize for the floating panels.
     explain.js powers the "?" on computed values; v2_drag.js is the GPU-composited
     drag + native-resize engine; movable.js wires the floating cards to it (and lets
     the camera look up). Self-contained DOM layer — does not touch the WebGL scene. -->
<script src="explain.js"></script>
<script src="v2_drag.js"></script>
<script src="movable.js"></script>
<!-- v3 (2026-06-09): the living-record marquee + the new tabs/sections + content, all
     consuming the engines above at runtime (panels.js references these via window.__*). -->
<script src="sounds.js"></script>
<script src="calendar.js"></script>
<script src="home.js"></script>
<script src="timemachine.js"></script>
<script src="planning_card.js"></script>
<script src="plant_profile.js"></script>
<script src="community.js"></script>
<script src="inventory.js"></script>
<script src="vision.js"></script>
<script src="backup.js"></script>
<!-- cross-project materials hub (window.__materials — shared-material intelligence) + Alex's app-feedback (window.__feedback) → both surface as מוח modes -->
<script src="materials_hub.js"></script>
<script src="feedback.js"></script>
<!-- v3.1: surface the harvested data — astronomy catalogs (→שמיים), agronomy/soil (→חצר), environment extras geology/water/history (→סביבה) -->
<script src="sky_extras.js"></script>
<script src="agro.js"></script>
<script src="env_extras.js"></script>
<!-- interactive spatial map (Leaflet, self-loaded) of the larkmont-vale — geology/springs/archaeology/trails + ציר-זמן.
     Surfaced as the full-screen "map face" of the app (🗺️ מפה pill flips the whole background to it; #mapbg)
     and via a launcher in the סביבה tab. (The crude GIS-draped-on-3D hybrid, terrain_layers.js, was retired.) -->
<script src="place_map.js"></script>
<!-- CLOUD SYNC (loads last so its setItem wrapper is in place for app writes): mirrors his
     home_* localStorage to /api/state (Cloudflare KV) so his edits survive device changes and
     the developer sees them. Degrades to local-only if the backend/KV isn't reachable. -->
<script src="cloud_sync.js"></script>
</body>
</html>
